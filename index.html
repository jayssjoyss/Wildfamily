<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 My Wild Family</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --jungle: #2d5016;
    --moss: #4a7c28;
    --leaf: #6baa37;
    --lime: #a8d45a;
    --earth: #7a4f2a;
    --sand: #c8995a;
    --cream: #f5edd8;
    --bark: #3d2410;
    --sky: #5bb8d4;
    --amber: #e8a020;
    --red: #d44f2a;
    --bg: #1a2e0a;
    --card-bg: #243815;
    --text: #f0e8d0;
    --muted: #9dbe72;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Jungle texture background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 10% 20%, rgba(107,170,55,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(45,80,22,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(26,46,10,0.9) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Leaf decorations */
  .leaf-deco {
    position: fixed;
    opacity: 0.06;
    font-size: 120px;
    pointer-events: none;
    z-index: 0;
    animation: sway 8s ease-in-out infinite;
  }
  .leaf-deco:nth-child(1) { top: -20px; left: -20px; transform: rotate(-30deg); }
  .leaf-deco:nth-child(2) { top: -10px; right: -20px; transform: rotate(40deg); animation-delay: 2s; }
  .leaf-deco:nth-child(3) { bottom: -20px; left: 10%; transform: rotate(15deg); animation-delay: 4s; }
  .leaf-deco:nth-child(4) { bottom: -10px; right: 5%; transform: rotate(-20deg); animation-delay: 1s; }

  @keyframes sway {
    0%, 100% { transform: rotate(-30deg) scale(1); }
    50% { transform: rotate(-25deg) scale(1.05); }
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px 20px 20px;
    border-bottom: 2px solid rgba(107,170,55,0.2);
  }

  .logo {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 800;
    background: linear-gradient(135deg, var(--lime), var(--amber), var(--sand));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  .logo-sub {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .paw-row {
    font-size: 22px;
    margin-top: 8px;
    animation: bounce-paws 2s ease-in-out infinite;
  }

  @keyframes bounce-paws {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  /* Auth section */
  #auth-section {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(107,170,55,0.15);
    flex-wrap: wrap;
  }

  #user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }

  #user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--leaf);
  }

  .btn {
    padding: 8px 20px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 13px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--leaf), var(--moss));
    color: white;
    box-shadow: 0 3px 12px rgba(107,170,55,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 18px rgba(107,170,55,0.4); }

  .btn-danger {
    background: rgba(212,79,42,0.2);
    color: var(--red);
    border: 1px solid rgba(212,79,42,0.3);
  }
  .btn-danger:hover { background: rgba(212,79,42,0.35); }

  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--leaf);
    color: var(--lime);
  }
  .btn-outline:hover { background: rgba(107,170,55,0.15); }

  /* Status badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
  }
  .status-connected { background: rgba(107,170,55,0.2); color: var(--lime); border: 1px solid rgba(107,170,55,0.3); }
  .status-offline { background: rgba(200,153,90,0.2); color: var(--sand); border: 1px solid rgba(200,153,90,0.3); }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Main container */
  main {
    position: relative;
    z-index: 5;
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Animal selector tabs */
  .animal-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 28px;
    justify-content: center;
  }

  .animal-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 16px;
    border-radius: 16px;
    border: 2px solid transparent;
    background: var(--card-bg);
    cursor: pointer;
    transition: all 0.25s;
    min-width: 80px;
  }

  .animal-tab:hover {
    border-color: rgba(107,170,55,0.4);
    transform: translateY(-3px);
  }

  .animal-tab.active {
    border-color: var(--leaf);
    background: rgba(107,170,55,0.15);
    box-shadow: 0 4px 16px rgba(107,170,55,0.2);
  }

  .animal-tab .emoji { font-size: 26px; }
  .animal-tab .tab-name {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .animal-tab.active .tab-name { color: var(--lime); }

  .animal-tab .photo-count {
    font-size: 10px;
    background: rgba(107,170,55,0.25);
    color: var(--lime);
    border-radius: 10px;
    padding: 1px 6px;
    font-weight: 700;
  }

  /* Section title */
  .section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .section-title h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 26px;
    font-weight: 800;
    color: var(--lime);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title h2 .animal-emoji { font-size: 32px; }

  /* Upload area */
  .upload-zone {
    border: 2px dashed rgba(107,170,55,0.4);
    border-radius: 20px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: rgba(107,170,55,0.04);
    margin-bottom: 24px;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--leaf);
    background: rgba(107,170,55,0.1);
  }

  .upload-zone input { display: none; }
  .upload-zone .upload-icon { font-size: 40px; margin-bottom: 10px; }
  .upload-zone p { color: var(--muted); font-size: 14px; }
  .upload-zone p strong { color: var(--lime); }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(107,170,55,0.3);
    border-top-color: var(--lime);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Photo grid */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .photo-card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(107,170,55,0.15);
    transition: all 0.25s;
    position: relative;
    group: true;
  }

  .photo-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    border-color: rgba(107,170,55,0.4);
  }

  .photo-card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
  }

  .photo-card .photo-info {
    padding: 10px 12px;
  }

  .photo-card .photo-date {
    font-size: 11px;
    color: var(--muted);
  }

  .photo-card .photo-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .photo-card .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(212,79,42,0.85);
    border: none;
    border-radius: 50%;
    width: 28px; height: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }

  .photo-card:hover .delete-btn { opacity: 1; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .empty-emoji { font-size: 64px; margin-bottom: 16px; }
  .empty-state p { font-size: 16px; }
  .empty-state small { font-size: 13px; opacity: 0.7; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 300px;
  }

  .toast-msg {
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    animation: toast-in 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast-success { background: rgba(107,170,55,0.9); color: white; border: 1px solid var(--leaf); }
  .toast-error { background: rgba(212,79,42,0.9); color: white; border: 1px solid var(--red); }
  .toast-info { background: rgba(91,184,212,0.9); color: var(--bark); border: 1px solid var(--sky); }

  @keyframes toast-in {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Fullscreen preview */
  #preview-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 500;
    justify-content: center;
    align-items: center;
    padding: 20px;
    backdrop-filter: blur(8px);
  }
  #preview-overlay.show { display: flex; }
  #preview-overlay img { max-width: 90vw; max-height: 85vh; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
  #preview-close {
    position: fixed;
    top: 20px;
    right: 24px;
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  #preview-close:hover { background: rgba(255,255,255,0.2); }

  /* Responsive */
  @media (max-width: 600px) {
    .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .animal-tab { min-width: 65px; padding: 8px 10px; }
    .animal-tab .emoji { font-size: 22px; }
  }

  /* Progress bar */
  .upload-progress {
    height: 4px;
    background: rgba(107,170,55,0.2);
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
  }
  .upload-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--leaf), var(--lime));
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* Animal category colors */
  [data-species="dog"] .animal-tab.active { border-color: var(--amber); box-shadow: 0 4px 16px rgba(232,160,32,0.2); }
  [data-species="cat"] .animal-tab.active { border-color: var(--sky); box-shadow: 0 4px 16px rgba(91,184,212,0.2); }
  [data-species="lizard"] .animal-tab.active { border-color: var(--lime); }
  [data-species="snake"] .animal-tab.active { border-color: var(--red); box-shadow: 0 4px 16px rgba(212,79,42,0.2); }
</style>
</head>
<body>

<!-- Leaf decorations -->
<div class="leaf-deco">🌿</div>
<div class="leaf-deco">🍃</div>
<div class="leaf-deco">🌱</div>
<div class="leaf-deco">🌾</div>

<!-- Header -->
<header>
  <div class="logo">🐾 My Wild Family</div>
  <div class="logo-sub">Album Photo de mes Animaux</div>
  <div class="paw-row">🐾 🐾 🐾</div>
</header>

<!-- Auth -->
<div id="auth-section">
  <div id="user-info" style="display:none"></div>
  <div id="auth-status">
    <span class="status-badge status-offline"><span class="dot"></span>Non connecté</span>
  </div>
  <button class="btn btn-primary" id="signin-btn" onclick="signIn()">🔗 Connecter Google Drive</button>
  <button class="btn btn-danger" id="signout-btn" style="display:none" onclick="signOut()">Déconnecter</button>
</div>

<!-- Main -->
<main>
  <!-- Animal Tabs -->
  <div class="animal-tabs" id="animal-tabs"></div>

  <!-- Section -->
  <div id="animal-section">
    <div class="section-title">
      <h2 id="current-animal-title"><span class="animal-emoji" id="current-emoji">🐾</span> <span id="current-name">Sélectionne un animal</span></h2>
      <button class="btn btn-outline" id="upload-btn-top" onclick="document.getElementById('file-input').click()" style="display:none">+ Ajouter des photos</button>
    </div>

    <!-- Upload Zone -->
    <div class="upload-zone" id="upload-zone" style="display:none"
      onclick="document.getElementById('file-input').click()"
      ondragover="handleDragOver(event)"
      ondragleave="handleDragLeave(event)"
      ondrop="handleDrop(event)">
      <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)">
      <div class="upload-icon">📸</div>
      <p><strong>Clique ou glisse des photos</strong></p>
      <p>JPG, PNG, GIF – plusieurs fichiers acceptés</p>
      <div class="upload-progress" id="upload-progress" style="display:none">
        <div class="upload-progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
    </div>

    <!-- Photo Grid -->
    <div class="photo-grid" id="photo-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-emoji" id="empty-emoji">📷</div>
      <p>Aucune photo pour <strong id="empty-name"></strong> encore !</p>
      <br><small>Connecte Google Drive et ajoute des photos 🌿</small>
    </div>
  </div>
</main>

<!-- Toast container -->
<div id="toast"></div>

<!-- Preview overlay -->
<div id="preview-overlay" onclick="closePreview()">
  <button id="preview-close" onclick="closePreview()">✕</button>
  <img id="preview-img" src="" alt="preview" onclick="event.stopPropagation()">
</div>

<script>
// ===== CONFIG =====
const CLIENT_ID = '
659577133920-39sb216r3gvqanmi03v0a3pikmsqkj16.apps.googleusercontent.com
'; // À remplir avec ton Google Client ID
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const FOLDER_NAME = 'MyWildFamilyAlbum';

// ===== ANIMAUX =====
const ANIMALS = [
  { id: 'tyler',    name: 'Tyler',    emoji: '🐕', species: 'dog' },
  { id: 'leelou',   name: 'Leelou',   emoji: '🐈', species: 'cat' },
  { id: 'murray',   name: 'Murray',   emoji: '🐈‍⬛', species: 'cat' },
  { id: 'cgt',      name: 'Cgt',      emoji: '🦎', species: 'lizard' },
  { id: 'chsct',    name: 'Chsct',    emoji: '🦎', species: 'lizard' },
  { id: 'momo',     name: 'Momo',     emoji: '🐍', species: 'snake' },
  { id: 'python',   name: 'Python',   emoji: '🐍', species: 'snake' },
  { id: 'boa',      name: 'Boa',      emoji: '🐍', species: 'snake' },
  { id: 'lucky',    name: 'Lucky',    emoji: '🐍', species: 'snake' },
  { id: 'sephiroth',name: 'Sephiroth',emoji: '🐍', species: 'snake' },
  { id: 'lampro',   name: 'Lampro',   emoji: '🐍', species: 'snake' },
];

// ===== STATE =====
let tokenClient = null;
let accessToken = null;
let rootFolderId = null;
let animalFolderIds = {};
let currentAnimal = null;
let photosCache = {}; // animalId -> [{id, name, thumbnailUrl, webViewLink}]

// ===== INIT =====
window.onload = () => {
  buildTabs();
  // Load Google Identity Services
  if (typeof google !== 'undefined') initGIS();
  else window.addEventListener('load', initGIS);
};

function initGIS() {
  if (!CLIENT_ID) {
    showToast('⚠️ Configure ton Client ID Google dans le code', 'error');
    return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: handleTokenResponse,
  });
}

function signIn() {
  if (!tokenClient) {
    showToast('Google Identity Services pas encore chargé', 'error');
    return;
  }
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function signOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken);
  accessToken = null;
  rootFolderId = null;
  animalFolderIds = {};
  photosCache = {};
  updateAuthUI(false);
  if (currentAnimal) renderPhotos(currentAnimal);
  showToast('Déconnecté de Google Drive', 'info');
}

async function handleTokenResponse(resp) {
  if (resp.error) { showToast('Erreur auth: ' + resp.error, 'error'); return; }
  accessToken = resp.access_token;
  
  // Get user info
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const user = await res.json();
    updateAuthUI(true, user);
  } catch(e) { updateAuthUI(true, null); }

  showToast('✅ Google Drive connecté !', 'success');
  await ensureRootFolder();
  if (currentAnimal) await loadPhotos(currentAnimal);
}

function updateAuthUI(connected, user = null) {
  document.getElementById('signin-btn').style.display = connected ? 'none' : 'block';
  document.getElementById('signout-btn').style.display = connected ? 'block' : 'none';
  const statusEl = document.getElementById('auth-status');
  const userInfo = document.getElementById('user-info');

  if (connected) {
    statusEl.innerHTML = `<span class="status-badge status-connected"><span class="dot"></span>Drive connecté</span>`;
    if (user) {
      userInfo.style.display = 'flex';
      userInfo.innerHTML = `<img id="user-avatar" src="${user.picture || ''}" onerror="this.style.display='none'"> <span>${user.name || user.email}</span>`;
    }
  } else {
    statusEl.innerHTML = `<span class="status-badge status-offline"><span class="dot"></span>Non connecté</span>`;
    userInfo.style.display = 'none';
  }
}

// ===== TABS =====
function buildTabs() {
  const container = document.getElementById('animal-tabs');
  container.innerHTML = '';
  ANIMALS.forEach(animal => {
    const tab = document.createElement('div');
    tab.className = 'animal-tab';
    tab.dataset.id = animal.id;
    tab.dataset.species = animal.species;
    tab.innerHTML = `
      <span class="emoji">${animal.emoji}</span>
      <span class="tab-name">${animal.name}</span>
      <span class="photo-count" id="count-${animal.id}">0</span>
    `;
    tab.onclick = () => selectAnimal(animal);
    container.appendChild(tab);
  });
  // Select first by default
  selectAnimal(ANIMALS[0]);
}

async function selectAnimal(animal) {
  currentAnimal = animal;
  // Update tabs
  document.querySelectorAll('.animal-tab').forEach(t => t.classList.remove('active'));
  const activeTab = document.querySelector(`[data-id="${animal.id}"]`);
  if (activeTab) activeTab.classList.add('active');

  // Update title
  document.getElementById('current-emoji').textContent = animal.emoji;
  document.getElementById('current-name').textContent = animal.name;
  document.getElementById('upload-zone').style.display = accessToken ? 'block' : 'none';
  document.getElementById('upload-btn-top').style.display = accessToken ? 'block' : 'none';
  
  await renderPhotos(animal);
  if (accessToken) await loadPhotos(animal);
}

// ===== DRIVE =====
async function driveRequest(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: {
      ...(options.headers || {}),
      Authorization: `Bearer ${accessToken}`
    }
  });
  if (!res.ok) throw new Error(`Drive API error: ${res.status}`);
  return res.json();
}

async function ensureRootFolder() {
  // Find or create root folder
  try {
    const search = await driveRequest(
      `https://www.googleapis.com/drive/v3/files?q=name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id,name)`
    );
    if (search.files.length > 0) {
      rootFolderId = search.files[0].id;
    } else {
      const folder = await driveRequest('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
      });
      rootFolderId = folder.id;
    }
  } catch(e) { showToast('Erreur création dossier Drive', 'error'); }
}

async function ensureAnimalFolder(animalId) {
  if (animalFolderIds[animalId]) return animalFolderIds[animalId];
  if (!rootFolderId) await ensureRootFolder();
  
  const search = await driveRequest(
    `https://www.googleapis.com/drive/v3/files?q=name='${animalId}' and '${rootFolderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id,name)`
  );
  if (search.files.length > 0) {
    animalFolderIds[animalId] = search.files[0].id;
  } else {
    const folder = await driveRequest('https://www.googleapis.com/drive/v3/files', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: animalId, mimeType: 'application/vnd.google-apps.folder', parents: [rootFolderId] })
    });
    animalFolderIds[animalId] = folder.id;
  }
  return animalFolderIds[animalId];
}

async function loadPhotos(animal) {
  if (!accessToken) return;
  try {
    const folderId = await ensureAnimalFolder(animal.id);
    const res = await driveRequest(
      `https://www.googleapis.com/drive/v3/files?q='${folderId}' in parents and mimeType contains 'image/' and trashed=false&fields=files(id,name,createdTime,thumbnailLink,webViewLink)&orderBy=createdTime desc`
    );
    photosCache[animal.id] = res.files || [];
    updateCount(animal.id, photosCache[animal.id].length);
    if (currentAnimal?.id === animal.id) renderPhotos(animal);
  } catch(e) {
    showToast('Erreur chargement photos', 'error');
  }
}

async function uploadPhoto(file, animal) {
  const folderId = await ensureAnimalFolder(animal.id);
  const metadata = { name: file.name, parents: [folderId] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', file);

  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,createdTime,thumbnailLink,webViewLink', {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}` },
    body: form
  });
  if (!res.ok) throw new Error('Upload failed');
  return res.json();
}

async function deletePhoto(fileId, animalId) {
  await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  photosCache[animalId] = (photosCache[animalId] || []).filter(p => p.id !== fileId);
  updateCount(animalId, photosCache[animalId].length);
  renderPhotos(currentAnimal);
  showToast('Photo supprimée', 'info');
}

// ===== RENDER =====
function renderPhotos(animal) {
  const grid = document.getElementById('photo-grid');
  const empty = document.getElementById('empty-state');
  const photos = photosCache[animal.id] || [];

  if (photos.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('empty-emoji').textContent = animal.emoji;
    document.getElementById('empty-name').textContent = animal.name;
    return;
  }

  empty.style.display = 'none';
  grid.innerHTML = photos.map(photo => {
    const thumb = photo.thumbnailLink ? photo.thumbnailLink.replace('s220', 's400') : '';
    const date = photo.createdTime ? new Date(photo.createdTime).toLocaleDateString('fr-FR') : '';
    return `
      <div class="photo-card" onclick="openPreview('${thumb || photo.webViewLink}')">
        ${thumb ? `<img src="${thumb}" alt="${photo.name}" loading="lazy">` : `<div style="aspect-ratio:1;background:var(--card-bg);display:flex;align-items:center;justify-content:center;font-size:40px;">${animal.emoji}</div>`}
        <div class="photo-info">
          <div class="photo-name">${photo.name}</div>
          <div class="photo-date">${date}</div>
        </div>
        <button class="delete-btn" onclick="event.stopPropagation(); confirmDelete('${photo.id}', '${animal.id}')" title="Supprimer">🗑️</button>
      </div>
    `;
  }).join('');
}

function updateCount(animalId, count) {
  const el = document.getElementById(`count-${animalId}`);
  if (el) el.textContent = count;
}

// ===== FILE HANDLING =====
async function handleFiles(files) {
  if (!accessToken) { showToast('Connecte Google Drive d\'abord !', 'error'); return; }
  if (!currentAnimal) { showToast('Sélectionne un animal', 'error'); return; }

  const arr = Array.from(files);
  const progress = document.getElementById('upload-progress');
  const bar = document.getElementById('progress-bar');
  progress.style.display = 'block';

  for (let i = 0; i < arr.length; i++) {
    bar.style.width = `${(i / arr.length) * 100}%`;
    showToast(`<span class="spinner"></span>Upload ${arr[i].name}...`, 'info');
    try {
      const uploaded = await uploadPhoto(arr[i], currentAnimal);
      if (!photosCache[currentAnimal.id]) photosCache[currentAnimal.id] = [];
      photosCache[currentAnimal.id].unshift(uploaded);
      updateCount(currentAnimal.id, photosCache[currentAnimal.id].length);
      renderPhotos(currentAnimal);
    } catch(e) {
      showToast(`Erreur upload: ${arr[i].name}`, 'error');
    }
  }
  bar.style.width = '100%';
  setTimeout(() => { progress.style.display = 'none'; bar.style.width = '0%'; }, 1000);
  showToast(`✅ ${arr.length} photo(s) uploadée(s) !`, 'success');
}

function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function handleDragLeave(e) { e.currentTarget.classList.remove('dragover'); }
function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
}

function confirmDelete(fileId, animalId) {
  if (confirm('Supprimer cette photo ?')) deletePhoto(fileId, animalId);
}

// ===== PREVIEW =====
function openPreview(url) {
  document.getElementById('preview-img').src = url;
  document.getElementById('preview-overlay').classList.add('show');
}
function closePreview() {
  document.getElementById('preview-overlay').classList.remove('show');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePreview(); });

// ===== TOAST =====
let toastTimeout = {};
function showToast(msg, type = 'info') {
  const container = document.getElementById('toast');
  const id = Date.now();
  const div = document.createElement('div');
  div.className = `toast-msg toast-${type}`;
  div.innerHTML = msg;
  div.id = `toast-${id}`;
  container.appendChild(div);
  setTimeout(() => { div.remove(); }, 3000);
}
</script>
